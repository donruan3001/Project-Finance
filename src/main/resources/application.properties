# BUG FIX: Configuração com fallback para permitir execução local e em container
# Se variáveis de ambiente estiverem definidas, usa elas (para Docker)
# Caso contrário, usa configuração local (para desenvolvimento)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:midea}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

debug=true
 
#server.port=8090

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.org.flywaydb=DEBUG
spring.flyway.locations=classpath:db

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

JWT_SECRET=your-256-bit-secret
